# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: okf

before:
  hooks:
    - go mod tidy

builds:
  - id: okf
    main: ./cmd/okf
    binary: okf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: okf
    ids: [okf]
    formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: "checksums.txt"

# Publishes a Homebrew formula to samcharles93/homebrew-tap on every
# release. Uses the deprecated (but still functional) `brews` key rather
# than the newer `homebrew_casks`, since a CLI tool is a Formula, not a
# Cask, semantically — see https://docs.brew.sh/Formula-Cookbook.
brews:
  - name: okf
    ids: [okf]
    repository:
      owner: samcharles93
      name: homebrew-tap
      branch: main
    directory: Formula
    homepage: "https://github.com/samcharles93/knowledge-catalog"
    description: "Open Knowledge Format (OKF) toolkit — a vendor-neutral CLI and MCP server for versioned, agent-readable project knowledge bundles."
    license: "Apache-2.0"
    commit_author:
      name: samcharles93
      email: samuel.catlow@gmail.com
    commit_msg_template: "brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    test: |
      system "#{bin}/okf version"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
